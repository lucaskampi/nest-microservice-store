name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supplier
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: carrier
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-check-timeout 30s
          --health-check-interval 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install shared package
        run: npm install -w packages/shared

      - name: Generate Prisma Client (Backend)
        run: npm run prisma:generate -w backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supplier

      - name: Generate Prisma Client (Auth)
        run: npm run prisma:generate -w auth
        env:
          DATABASE_URL: file:./auth/prisma/dev.db

      - name: Generate Prisma Client (Supplier)
        run: npm run prisma:generate -w supplier
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supplier

      - name: Generate Prisma Client (Carrier)
        run: npm run prisma:generate -w carrier
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/carrier

      - name: Run unit tests (Auth)
        run: npm run test -w auth
        env:
          DATABASE_URL: file:./auth/prisma/dev.db

      - name: Run unit tests (Backend)
        run: npm run test -w backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supplier
          SUPPLIER_SERVICE_URL: http://localhost:4001/api
          CARRIER_SERVICE_URL: http://localhost:4002/api

      - name: Run unit tests (Gateway)
        run: npm run test -w gateway

      - name: Run unit tests (Supplier)
        run: npm run test -w supplier
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supplier

      - name: Run unit tests (Carrier)
        run: npm run test -w carrier
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/carrier

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./auth/coverage/coverage-final.json
          flags: auth
          name: auth-coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./gateway/coverage/coverage-final.json
          flags: gateway
          name: gateway-coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./supplier/coverage/coverage-final.json
          flags: supplier
          name: supplier-coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./carrier/coverage/coverage-final.json
          flags: carrier
          name: carrier-coverage

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth
          push: false
          tags: nest-microservices/auth:latest

      - name: Build Backend Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: nest-microservices/backend:latest

      - name: Build Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          tags: nest-microservices/gateway:latest

      - name: Build Supplier Service
        uses: docker/build-push-action@v5
        with:
          context: ./supplier
          push: false
          tags: nest-microservices/supplier:latest

      - name: Build Carrier Service
        uses: docker/build-push-action@v5
        with:
          context: ./carrier
          push: false
          tags: nest-microservices/carrier:latest
